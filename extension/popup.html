<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>Aura · LinkedIn Capture</h1>
  <p class="subtitle">Browser-based analytics ingestion</p>

  <!-- LOGIN VIEW -->
  <div id="view-login" class="view" style="display:none;">
    <div class="section">
      <div class="section-title">Connect to Aura</div>
      <input type="email" id="email" placeholder="Email" autocomplete="email">
      <input type="password" id="password" placeholder="Password" autocomplete="current-password">
      <button class="primary" id="connectBtn">Connect</button>
    </div>
    <div id="loginMsg"></div>
  </div>

  <!-- CONNECTED VIEW -->
  <div id="view-connected" class="view" style="display:none;">

    <!-- Page Detection -->
    <div class="section" id="pageDetection">
      <div class="section-title">Current Page</div>
      <div class="page-badge" id="pageBadge">
        <span class="badge-icon" id="badgeIcon">—</span>
        <div>
          <div class="badge-label" id="badgeLabel">Checking…</div>
          <div class="badge-desc" id="badgeDesc">Detecting LinkedIn page type</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Status -->
    <div class="section">
      <div class="section-title">Connection</div>
      <div class="status-row">
        <span class="status-label">Status</span>
        <span class="status-value ok" id="connStatus">Connected</span>
      </div>
      <div class="status-row">
        <span class="status-label">Handle</span>
        <span class="status-value" id="handleDisplay">—</span>
      </div>
      <div class="status-row">
        <span class="status-label">Last capture</span>
        <span class="status-value" id="lastCapture">—</span>
      </div>
      <div class="status-row">
        <span class="status-label">Records sent</span>
        <span class="status-value" id="recordsSent">0</span>
      </div>
      <div class="status-row">
        <span class="status-label">Errors</span>
        <span class="status-value" id="errorCount">0</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Actions -->
    <div class="section">
      <div class="section-title">Actions</div>
      <button class="primary" id="captureBtn" disabled>
        <span id="captureBtnText">Capture This Page</span>
      </button>
      <div style="height:6px"></div>
      <button id="guidedBtn">
        <span id="guidedBtnText">Run Guided Capture</span>
      </button>
      <div style="height:6px"></div>
      <button class="ghost" id="disconnectBtn">Disconnect</button>
    </div>

    <div id="captureMsg"></div>

    <!-- Guided Progress -->
    <div id="guidedProgress" style="display:none;">
      <div class="divider"></div>
      <div class="section">
        <div class="section-title">Guided Capture</div>
        <div id="guidedSteps"></div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="progress-label" id="progressLabel">Starting…</p>
      </div>
    </div>

    <!-- Recent Captures -->
    <div id="recentCaptures" style="display:none;">
      <div class="divider"></div>
      <div class="section">
        <div class="section-title">Recent Captures</div>
        <div id="captureHistory"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
