<!doctype html>

    <script>
      (function() {
        try {
          var t = localStorage.getItem('aura-theme');
          var theme = (t === 'dark' || t === 'light') ? t : 'light';
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.classList.remove('light', 'dark');
          document.documentElement.classList.add(theme);
          document.documentElement.style.backgroundColor = theme === 'dark' ? '#0c0c0c' : '#f7f7f7';
        } catch(e) {}
      })();
    </script>

  <body style="background-color: inherit;">
    <div id="splash" style="
      position:fixed; inset:0; z-index:9999;
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:12px;
      background: var(--paper, #F5F1E8);
      transition: opacity 0.4s ease;

      <svg width="48" height="48" viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg" style="color:#B08D3A">

            <line x1="-16" y1="-27" x2="-19" y2="-31" opacity="0.25"/>
            <line x1="16" y1="-27" x2="19" y2="-31" opacity="0.25"/>
          </g>
        </g>
      </svg>
    </div>
    <script>
      (function() {
        try {
          var splash = document.getElementById('splash');
          var t = localStorage.getItem('aura-theme');
          var theme = (t === 'dark' || t === 'light') ? t : 'light';
          if (splash) {
            splash.style.backgroundColor = theme === 'dark' ? '#0c0c0c' : '#F5F1E8';
            splash.querySelector('svg').style.color = theme === 'dark' ? '#D4B056' : '#B08D3A';
          }
        } catch(e) {}
      })();
    </script>
